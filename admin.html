<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель управления — 4D Models</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body style="background: #05070c; color: #fff; font-family: sans-serif; padding: 20px; max-width: 900px; margin: 0 auto;">

  <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color, #1f2937); padding-bottom: 15px;">
    <h1 style="font-size: 22px; margin: 0;">🛠 Панель администратора</h1>
    <a href="/" style="color: #38bdf8; text-decoration: none; font-size: 14px;">← Вернуться на сайт</a>
  </header>

  <!-- Форма загрузки новой модели -->
  <section style="background: #0b0f19; border: 1px solid var(--border-color, #1f2937); border-radius: 12px; padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <h2 style="font-size: 18px; margin-bottom: 20px; color: #fff;">Загрузить новую 3D-модель</h2>
    
    <form id="uploadForm" style="display: flex; flex-direction: column; gap: 15px;">
      <div>
        <label style="display: block; font-size: 13px; color: #9ca3af; margin-bottom: 5px;">Название модели</label>
        <input type="text" id="modelTitle" required placeholder="Например: Futuristic Chair" style="width: 100%; padding: 12px; background: #05070c; border: 1px solid #1f2937; color: #fff; border-radius: 8px; box-sizing: border-box;">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
          <label style="display: block; font-size: 13px; color: #9ca3af; margin-bottom: 5px;">Категория</label>
          <select id="modelCategory" style="width: 100%; padding: 12px; background: #05070c; border: 1px solid #1f2937; color: #fff; border-radius: 8px; box-sizing: border-box;">
            <option value="Furniture">Furniture</option>
            <option value="Nature & Plants">Nature & Plants</option>
            <option value="Architecture & Interior">Architecture & Interior</option>
            <option value="Characters & Creatures">Characters & Creatures</option>
            <option value="Vehicles & Tech">Vehicles & Tech</option>
            <option value="Electronics & Gadgets">Electronics & Gadgets</option>
            <option value="Clothing & Fashion">Clothing & Fashion</option>
            <option value="Food & Drinks">Food & Drinks</option>
            <option value="Tools & Equipment">Tools & Equipment</option>
            <option value="Abstract & Decor">Abstract & Decor</option>
          </select>
        </div>
        <div>
          <label style="display: block; font-size: 13px; color: #9ca3af; margin-bottom: 5px;">Автор</label>
          <input type="text" id="modelAuthor" value="4D Models" placeholder="Имя автора" style="width: 100%; padding: 12px; background: #05070c; border: 1px solid #1f2937; color: #fff; border-radius: 8px; box-sizing: border-box;">
        </div>
      </div>

      <div>
        <label style="display: block; font-size: 13px; color: #9ca3af; margin-bottom: 5px;">Файл модели (.glb / .gltf)</label>
        <input type="file" id="modelFile" accept=".glb,.gltf" required style="width: 100%; padding: 10px; background: #05070c; border: 1px solid #1f2937; color: #9ca3af; border-radius: 8px; box-sizing: border-box;">
      </div>

      <button type="submit" id="submitBtn" style="padding: 14px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; margin-top: 10px;">Загрузить модель в каталог</button>
    </form>
  </section>

  <!-- Список существующих моделей -->
  <section>
    <h2 style="font-size: 18px; margin-bottom: 15px;">Управление загруженными моделями</h2>
    <div id="adminModelsList" style="display: flex; flex-direction: column; gap: 10px;">
      <p style="color: #9ca3af;">Загрузка списка...</p>
    </div>
  </section>

  <script>
    async function loadAdminModels() {
      const listContainer = document.getElementById('adminModelsList');
      try {
        const res = await fetch('/api/assets');
        const models = await res.json();
        
        if (models.length === 0) {
          listContainer.innerHTML = '<p style="color: #9ca3af; font-size: 14px;">В каталоге пока нет ни одной модели.</p>';
          return;
        }

        listContainer.innerHTML = '';
        models.forEach(model => {
          const item = document.createElement('div');
          item.style.cssText = 'display: flex; justify-content: space-between; align-items: center; background: #0b0f19; border: 1px solid #1f2937; padding: 15px; border-radius: 8px;';
          
          item.innerHTML = `
            <div>
              <h4 style="margin: 0 0 5px 0; font-size: 15px; color: #fff;">${model.title}</h4>
              <p style="margin: 0; font-size: 12px; color: #9ca3af;">Категория: ${model.category} | Автор: ${model.author}</p>
            </div>
            <button onclick="deleteModel('${model.id}')" style="background: #ef4444; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;">Удалить</button>
          `;
          listContainer.appendChild(item);
        });
      } catch (err) {
        console.error('Ошибка загрузки моделей:', err);
        listContainer.innerHTML = '<p style="color: #ef4444; font-size: 14px;">Не удалось загрузить список моделей.</p>';
      }
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const titleInput = document.getElementById('modelTitle').value;
      const categoryInput = document.getElementById('modelCategory').value;
      const authorInput = document.getElementById('modelAuthor').value;
      const fileInput = document.getElementById('modelFile').files[0];

      if (!fileInput) {
        alert('Пожалуйста, выберите файл модели (.glb или .gltf)');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = 'Загрузка на сервер...';

      const formData = new FormData();
      formData.append('title', titleInput);
      formData.append('category', categoryInput);
      formData.append('author', authorInput);
      formData.append('file', fileInput);

      try {
        const res = await fetch('/api/assets', {
          method: 'POST',
          body: formData
        });

        if (res.ok) {
          document.getElementById('uploadForm').reset();
          loadAdminModels();
          alert('Модель успешно загружена в каталог!');
        } else if (res.status === 401) {
          alert('Ошибка авторизации. Перезагрузите страницу.');
          location.reload();
        } else {
          const errText = await res.text();
          console.error('Ошибка сервера:', errText);
          alert('Ошибка при загрузке модели. Проверьте консоль (F12).');
        }
      } catch (err) {
        console.error('Ошибка сети:', err);
        alert('Не удалось связаться с сервером.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Загрузить модель в каталог';
      }
    });

    async function deleteModel(id) {
      if (!confirm('Вы действительно хотите удалить эту модель?')) return;

      try {
        const res = await fetch(`/api/assets/${id}`, {
          method: 'DELETE'
        });

        if (res.ok) {
          loadAdminModels();
        } else if (res.status === 401) {
          alert('Ошибка авторизации. Перезагрузите страницу.');
          location.reload();
        } else {
          alert('Не удалось удалить модель.');
        }
      } catch (err) {
        console.error('Ошибка удаления:', err);
      }
    }

    loadAdminModels();
  </script>
</body>
</html>
