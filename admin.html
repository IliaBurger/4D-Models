<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4D Models // Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">4D MODELS // ADMIN</div>
    <nav>
      <a href="index.html" style="color: var(--text-secondary); text-decoration: none;">Home</a>
    </nav>
  </header>

  <div style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
    
    <!-- Форма добавления модели -->
    <div style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; margin-bottom: 40px;">
      <h2 style="color: #fff; font-size: 20px; margin-bottom: 20px;">Add New 3D Model</h2>
      
      <form id="uploadForm" style="display: flex; flex-direction: column; gap: 16px;">
        <div>
          <label style="display: block; color: var(--text-secondary); font-size: 13px; margin-bottom: 6px;">Model Title</label>
          <input type="text" id="titleInput" required style="width: 100%; padding: 12px; background: #05070c; border: 1px solid var(--border-color); color: #fff; border-radius: 8px; box-sizing: border-box;">
        </div>

        <div>
          <label style="display: block; color: var(--text-secondary); font-size: 13px; margin-bottom: 6px;">Category</label>
          <select id="categoryInput" style="width: 100%; padding: 12px; background: #05070c; border: 1px solid var(--border-color); color: #fff; border-radius: 8px; box-sizing: border-box;">
            <option value="Furniture">Furniture</option>
            <option value="Nature & Plants">Nature & Plants</option>
            <option value="Architecture & Interior">Architecture & Interior</option>
            <option value="Characters & Creatures">Characters & Creatures</option>
            <option value="Vehicles & Tech">Vehicles & Tech</option>
            <option value="Electronics & Gadgets">Electronics & Gadgets</option>
            <option value="Clothing & Fashion">Clothing & Fashion</option>
            <option value="Food & Drinks">Food & Drinks</option>
            <option value="Tools & Equipment">Tools & Equipment</option>
            <option value="Abstract & Decor">Abstract & Decor</option>
          </select>
        </div>

        <div>
          <label style="display: block; color: var(--text-secondary); font-size: 13px; margin-bottom: 6px;">Author</label>
          <input type="text" id="authorInput" required style="width: 100%; padding: 12px; background: #05070c; border: 1px solid var(--border-color); color: #fff; border-radius: 8px; box-sizing: border-box;">
        </div>

        <div>
          <label style="display: block; color: var(--text-secondary); font-size: 13px; margin-bottom: 6px;">3D Model File (.gltf, .glb)</label>
          <input type="file" id="fileInput" accept=".glb,.gltf" required style="color: var(--text-secondary);">
        </div>

        <button type="submit" style="padding: 14px; background: var(--accent-gradient); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px;">Publish Model</button>
      </form>
    </div>

    <!-- Управление загруженными моделями -->
    <div style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px;">
      <h2 style="color: #fff; font-size: 20px; margin-bottom: 20px;">Manage Uploaded Models</h2>
      <div id="adminModelsList" style="display: flex; flex-direction: column; gap: 12px;">
        <p style="color: var(--text-secondary);">Загрузка списка...</p>
      </div>
    </div>

  </div>

  <script>
    const form = document.getElementById('uploadForm');
    const adminList = document.getElementById('adminModelsList');

    async function loadAdminModels() {
      try {
        const res = await fetch('/api/assets');
        const models = await res.json();
        
        adminList.innerHTML = '';
        if (models.length === 0) {
          adminList.innerHTML = '<p style="color: var(--text-secondary);">Нет добавленных моделей</p>';
          return;
        }

        models.forEach(m => {
          const item = document.createElement('div');
          item.style.cssText = 'display: flex; justify-content: space-between; align-items: center; background: #05070c; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border-color);';
          item.innerHTML = `
            <div>
              <strong style="color: #fff; display: block; margin-bottom: 2px;">${m.title}</strong>
              <span style="font-size: 12px; color: var(--text-secondary);">${m.category} • ${m.author}</span>
            </div>
            <button onclick="deleteModel('${m.id}')" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;">Удалить</button>
          `;
          adminList.appendChild(item);
        });
      } catch (err) {
        console.error(err);
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData();
      formData.append('title', document.getElementById('titleInput').value);
      formData.append('category', document.getElementById('categoryInput').value);
      formData.append('author', document.getElementById('authorInput').value);
      formData.append('file', document.getElementById('fileInput').files[0]);

      try {
        const res = await fetch('/api/assets', {
          method: 'POST',
          body: formData
        });

        if (res.ok) {
          form.reset();
          loadAdminModels();
          alert('Модель успешно опубликована!');
        } else {
          alert('Ошибка при публикации');
        }
      } catch (err) {
        console.error(err);
        alert('Ошибка соединения с сервером');
      }
    });

    async function deleteModel(id) {
      if (!confirm('Удалить эту модель?')) return;
      try {
        const res = await fetch(`/api/assets/${id}`, { method: 'DELETE' });
        if (res.ok) {
          loadAdminModels();
        } else {
          alert('Не удалось удалить модель');
        }
      } catch (err) {
        console.error(err);
      }
    }

    loadAdminModels();
  </script>
</body>
</html>
